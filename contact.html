<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initiate System Integration — Nexara GenAI</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <nav class="nav-container">
            <a href="index.html" class="nav-logo">NEXARA GENAI</a>
            <div class="nav-right-block">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <a href="contact.html" class="cta-btn">Connect Pipeline</a>
            </div>
        </nav>
    </header>
    <main class="grid-container">
        <h2 class="section-title">Connect Infrastructure Pipelines</h2>
        <p class="section-subtitle">Route your automation bottlenecks, database requirements, or technical features straight to our systems integration branch.</p>
        <form class="corporate-form" action="#" method="POST">
            <div class="form-group">
                <label for="corporate-name">Corporate Identity Name</label>
                <input type="text" id="corporate-name" name="name" placeholder="John Doe / Enterprise Ltd" required>
            </div>
            <div class="form-group">
                <label for="corporate-email">Verified Routing Contact Email</label>
                <input type="email" id="corporate-email" name="email" placeholder="client@company.com" required>
            </div>
            <div class="form-group">
                <label for="corporate-blueprint">Project Core Technical Blueprint Specifications</label>
                <textarea id="corporate-blueprint" name="scope" rows="5" placeholder="Specify CRM bottlenecks, workflow automation targets or custom application scaling models..." required></textarea>
            </div>
            <button type="submit" class="cta-btn" style="width: 100%; background: #fff; color: #050507; padding: 0.9rem;">Transmit Scope Integration Data</button>
        </form>
    </main>
    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 Nexara GenAI. All Core Systems Operational.</p>
        </div>
    </footer>
    <script src="assets/js/main.js"></script>
</body>
</html>
